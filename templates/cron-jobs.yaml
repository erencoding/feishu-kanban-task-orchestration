# Hermes cronjob 定义清单
#
# 按下面的命令在你机器上注册：
#   hermes cron add ...
# 或在 hermes UI 里手工创建。
#
# 两个 job 都用 no_agent=true（无 LLM 消耗），失败/有变化时才输出。

jobs:
  - name: 飞书事件监听守护(tmux 保活)
    schedule: "* * * * *"           # 每 60 秒
    no_agent: true
    script: ~/.hermes/scripts/base_watch_supervisor.py
    description: |
      检查 tmux session 是否存在；不存在就拉起 lark-cli event +subscribe
      pipe 到 base_event_listener.py。每次启动幂等地调一次 drive subscribe API。

  - name: Kanban → 飞书写回(3 分钟轮询)
    schedule: "*/3 * * * *"         # 每 3 分钟
    no_agent: true
    script: ~/.hermes/scripts/kanban_watch.py
    description: |
      读取本地 hermes kanban 状态，对比上次状态 cache。
      done/blocked/running 转换 → 写回飞书表对应字段；
      [QUESTION]/[ANSWER] comment → 写澄清记录与澄清状态。

# 注意事项：
# 1. 第一个 job 要求 tmux 已安装、lark-cli 已 OAuth 完成。
# 2. config.yaml 必须能被脚本找到（默认 ~/.hermes/feishu-kanban-task-orchestration/config.yaml
#    或脚本同级 ../config.yaml；也可以 export FKTO_CONFIG=/path/to/config.yaml）。
# 3. 第二个 job 跑前确保 hermes kanban list --tenant <你的 tenant> --json 能正常输出 JSON。
